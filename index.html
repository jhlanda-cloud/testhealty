<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// 100g 기준 영양성분 데이터베이스 (식약처 식품영양성분 DB 참고 근사치)
// [이름, kcal, 탄수화물(g), 단백질(g), 지방(g)] / 100g
const FOOD_DB = [

const macroLookupByName = {};
FOOD_DB.forEach(([n,k,c,p,f]) => { macroLookupByName[n] = {kcal:k, carb:c, protein:p, fat:f}; });

// 운동별 분당 소모 칼로리 (체중 70kg 성인 기준, MET값 × 체중(kg) × 3.5 / 200 공식 적용)
// [운동명, MET, 분당kcal(70kg기준)]
const EXERCISE_DB = [
  ["걷기 (보통 속도, 5km/h)", 3.5, 4.3],
  ["빠르게 걷기 (6km/h)", 5.0, 6.1],
  ["달리기 (8km/h)", 8.3, 10.2],
  ["달리기 (10km/h)", 9.8, 12.0],
  ["자전거 타기 (보통)", 6.8, 8.3],
  ["수영 (자유형, 보통)", 8.3, 10.2],
  ["줄넘기", 11.0, 13.5],
  ["등산", 7.0, 8.6],
  ["계단 오르기", 8.8, 10.8],
  ["요가", 2.5, 3.1],
  ["웨이트 트레이닝 (보통)", 5.0, 6.1],
  ["축구", 7.0, 8.6],
  ["농구", 6.5, 8.0],
  ["헬스 자전거 (고강도)", 10.5, 12.9],
];

// 목표 칼로리 맞춤 식단 템플릿 (기준 그램수, 목표 칼로리에 비례 조정됨)
const MEAL_PLANS = {
  "한식": [
    { meal: "아침", name: "현미밥", grams: 150 },
    { meal: "아침", name: "계란후라이", grams: 60 },
    { meal: "아침", name: "시금치나물", grams: 50 },
    { meal: "점심", name: "비빔밥", grams: 400 },
    { meal: "점심", name: "미역국", grams: 200 },
    { meal: "저녁", name: "불고기", grams: 150 },
    { meal: "저녁", name: "백미밥", grams: 200 },
    { meal: "저녁", name: "콩나물무침", grams: 50 },
  ],
  "중식": [
    { meal: "아침", name: "만두", grams: 150 },
    { meal: "점심", name: "짜장면", grams: 400 },
    { meal: "저녁", name: "짬뽕", grams: 400 },
    { meal: "저녁", name: "탕수육", grams: 150 },
  ],
  "양식": [
    { meal: "아침", name: "샌드위치", grams: 150 },
    { meal: "아침", name: "우유", grams: 200 },
    { meal: "점심", name: "파스타(토마토)", grams: 350 },
    { meal: "점심", name: "샐러드(드레싱포함)", grams: 100 },
    { meal: "저녁", name: "스테이크", grams: 200 },
    { meal: "저녁", name: "감자", grams: 150 },
    { meal: "저녁", name: "샐러드(드레싱포함)", grams: 100 },
  ],
};

const STORAGE_KEY_PREFIX = 'calorie-log:';
const todayStr = () => {
  const d = new Date();
  return d.toISOString().slice(0,10);
};
const addDays = (dateStr, n) => {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
};
const fmtDateLabel = (dateStr) => {
  const d = new Date(dateStr + 'T00:00:00');
  const w = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${w})`;
};

function App(){
  const [date, setDate] = useState(todayStr());
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [goal, setGoal] = useState(2000);
  const [weight, setWeight] = useState(70);

  const [foodName, setFoodName] = useState('');
  const [grams, setGrams] = useState('');
  const [customMode, setCustomMode] = useState(false);
  const [customKcalPer100, setCustomKcalPer100] = useState('');
  const [selectedCuisine, setSelectedCuisine] = useState('한식');

  const scaledMealPlan = useMemo(() => {
    const template = MEAL_PLANS[selectedCuisine];
    const baseTotal = template.reduce((s, item) => {
      const m = macroLookupByName[item.name];
      return s + (m ? m.kcal * item.grams / 100 : 0);
    }, 0);
    const scale = baseTotal > 0 ? goal / baseTotal : 1;
    const items = template.map(item => {
      const m = macroLookupByName[item.name] || {kcal:0,carb:0,protein:0,fat:0};
      const g = Math.round(item.grams * scale / 10) * 10; // 10g 단위로 보기 좋게 반올림
      const ratio = g / 100;
      return {
        meal: item.meal,
        name: item.name,
        grams: g,
        kcal: Math.round(m.kcal * ratio),
        carb: Math.round(m.carb * ratio * 10) / 10,
        protein: Math.round(m.protein * ratio * 10) / 10,
        fat: Math.round(m.fat * ratio * 10) / 10,
      };
    });
    const totalKcal = items.reduce((s,i) => s + i.kcal, 0);
    return { items, totalKcal };
  }, [selectedCuisine, goal]);

  const key = STORAGE_KEY_PREFIX + date;

  useEffect(() => {
    let cancelled = false;
    async function load(){
      setLoading(true);
      try{
        const res = await window.storage.get(key, false);
        if(!cancelled){
          setEntries(res && res.value ? JSON.parse(res.value) : []);
        }
      }catch(e){
        if(!cancelled) setEntries([]);
      }
      setLoading(false);
    }
    load();
    return () => { cancelled = true; };
  }, [date]);

  useEffect(() => {
    async function loadGoal(){
      try{
        const res = await window.storage.get('calorie-goal', false);
        if(res && res.value) setGoal(JSON.parse(res.value));
      }catch(e){ /* no goal set yet */ }
    }
    loadGoal();
    async function loadWeight(){
      try{
        const res = await window.storage.get('user-weight', false);
        if(res && res.value) setWeight(JSON.parse(res.value));
      }catch(e){ /* no weight set yet */ }
    }
    loadWeight();
  }, []);

  const saveWeight = async (val) => {
    setWeight(val);
    try{
      await window.storage.set('user-weight', JSON.stringify(val), false);
    }catch(e){ console.error('체중 저장 실패', e); }
  };

  const saveEntries = async (next) => {
    setEntries(next);
    try{
      await window.storage.set(key, JSON.stringify(next), false);
    }catch(e){ console.error('저장 실패', e); }
  };

  const saveGoal = async (val) => {
    setGoal(val);
    try{
      await window.storage.set('calorie-goal', JSON.stringify(val), false);
    }catch(e){ console.error('목표 저장 실패', e); }
  };

  const total = useMemo(() => entries.reduce((s,e) => s + e.kcal, 0), [entries]);
  const macroTotals = useMemo(() => entries.reduce((acc,e) => ({
    carb: acc.carb + (e.carb||0),
    protein: acc.protein + (e.protein||0),
    fat: acc.fat + (e.fat||0),
  }), {carb:0, protein:0, fat:0}), [entries]);
  const macroPct = useMemo(() => {
    const carbKcal = macroTotals.carb * 4;
    const proteinKcal = macroTotals.protein * 4;
    const fatKcal = macroTotals.fat * 9;
    const sumKcal = carbKcal + proteinKcal + fatKcal;
    if(sumKcal <= 0) return {carb:0, protein:0, fat:0};
    return {
      carb: Math.round(carbKcal/sumKcal*100),
      protein: Math.round(proteinKcal/sumKcal*100),
      fat: Math.round(fatKcal/sumKcal*100),
    };
  }, [macroTotals]);
  const pct = Math.min(100, Math.round((total/goal)*100) || 0);
  const isOverGoal = total > goal;
  const overAmount = total - goal;
  const isNearGoal = !isOverGoal && goal > 0 && total >= goal * 0.9 && total > 0;
  const praiseMessages = [
    "오늘 칼로리 관리 완벽해요! 목표에 딱 맞췄네요 👏",
    "훌륭해요! 목표 칼로리를 알맞게 지켰어요.",
    "잘 하고 계세요! 이 페이스 그대로 유지해보세요.",
    "오늘 식단 균형이 아주 좋아요!",
  ];
  const praiseMessage = useMemo(() => praiseMessages[Math.floor(Math.random() * praiseMessages.length)], [date, isNearGoal]);

  const matchedFood = FOOD_DB.find(f => f[0] === foodName);

  const handleAdd = () => {
    const g = parseFloat(grams);
    if(!g || g <= 0) return;
    let kcalPer100, name, carbPer100=0, proteinPer100=0, fatPer100=0;
    if(customMode){
      const c = parseFloat(customKcalPer100);
      if(!c || c <= 0) return;
      kcalPer100 = c;
      name = foodName.trim() || '직접 입력 음식';
      // 직접 입력은 칼로리만 알 수 있어 탄/단/지는 추정 불가로 0 처리
    } else {
      if(!matchedFood) return;
      const m = macroLookupByName[matchedFood[0]];
      kcalPer100 = m.kcal; carbPer100 = m.carb; proteinPer100 = m.protein; fatPer100 = m.fat;
      name = matchedFood[0];
    }
    const ratio = g / 100;
    const kcal = Math.round(kcalPer100 * ratio);
    const carb = Math.round(carbPer100 * ratio * 10) / 10;
    const protein = Math.round(proteinPer100 * ratio * 10) / 10;
    const fat = Math.round(fatPer100 * ratio * 10) / 10;
    const next = [...entries, { id: Date.now(), name, grams: g, kcal, kcalPer100, carb, protein, fat, carbPer100, proteinPer100, fatPer100, isCustom: customMode }];
    saveEntries(next);
    setFoodName(''); setGrams(''); setCustomKcalPer100('');
  };

  const handleDelete = (id) => {
    saveEntries(entries.filter(e => e.id !== id));
  };

  const [editingId, setEditingId] = useState(null);
  const [editGrams, setEditGrams] = useState('');

  const startEdit = (entry) => {
    setEditingId(entry.id);
    setEditGrams(String(entry.grams));
  };

  const cancelEdit = () => {
    setEditingId(null);
    setEditGrams('');
  };

  const saveEdit = (entry) => {
    const g = parseFloat(editGrams);
    if(!g || g <= 0) return;
    const ratio = g / 100;
    // 과거 저장 데이터 호환: per100 필드가 없으면 기존 grams 기준으로 역산
    const kcalPer100 = entry.kcalPer100 ?? (entry.grams ? entry.kcal / (entry.grams/100) : 0);
    const carbPer100 = entry.carbPer100 ?? (entry.grams ? (entry.carb||0) / (entry.grams/100) : 0);
    const proteinPer100 = entry.proteinPer100 ?? (entry.grams ? (entry.protein||0) / (entry.grams/100) : 0);
    const fatPer100 = entry.fatPer100 ?? (entry.grams ? (entry.fat||0) / (entry.grams/100) : 0);
    const updated = {
      ...entry,
      grams: g,
      kcal: Math.round(kcalPer100 * ratio),
      carb: Math.round(carbPer100 * ratio * 10) / 10,
      protein: Math.round(proteinPer100 * ratio * 10) / 10,
      fat: Math.round(fatPer100 * ratio * 10) / 10,
      kcalPer100, carbPer100, proteinPer100, fatPer100,
    };
    saveEntries(entries.map(e => e.id === entry.id ? updated : e));
    setEditingId(null);
    setEditGrams('');
  };

  return (
    <div>
      <div className="label-box">
        <div className="label-title">오늘의 칼로리</div>
        <div className="date-nav">
          <button onClick={() => setDate(addDays(date,-1))}>◀ 이전</button>
          <span style={{fontWeight:700}}>{fmtDateLabel(date)}</span>
          <button onClick={() => setDate(addDays(date,1))}>다음 ▶</button>
        </div>
        <div className="kcal-row">
          <span className="label">섭취 칼로리</span>
          <span className="value">{loading ? '...' : total.toLocaleString()}<span style={{fontSize:16,fontWeight:600}}> kcal</span></span>
        </div>
        <div className="goal-bar-wrap">
          <div className="goal-bar-bg">
            <div className="goal-bar-fill" style={{width: pct + '%', background: isOverGoal ? 'var(--warn)' : 'var(--accent)'}}></div>
          </div>
          <div className="goal-text">
            <span>목표 대비 {pct}%</span>
            <span>
              목표:
              <input
                type="number"
                value={goal}
                onChange={e => saveGoal(parseInt(e.target.value)||0)}
                style={{width:60, marginLeft:4, border:'1px solid var(--line)', padding:'1px 4px', fontFamily:'inherit'}}
              /> kcal
            </span>
          </div>
        </div>
        {isNearGoal && (
          <div className="praise-banner">
            🎉 {praiseMessage}
          </div>
        )}
        {isOverGoal && (
          <div className="warn-banner">
            ⚠ 목표 칼로리를 {overAmount.toLocaleString()} kcal 초과했어요.
          </div>
        )}
        {isOverGoal && (
          <div className="exercise-section">
            <div className="exercise-header">
              <span>초과분 {overAmount.toLocaleString()} kcal 소모하려면</span>
              <span className="weight-input">
                체중
                <input
                  type="number"
                  value={weight}
                  onChange={e => saveWeight(parseInt(e.target.value)||70)}
                  style={{width:44, marginLeft:4, marginRight:2, border:'1px solid var(--line)', padding:'1px 4px', fontFamily:'inherit'}}
                />kg
              </span>
            </div>
            <div className="exercise-list">
              {EXERCISE_DB.map(([name, met, kcalPerMinAt70]) => {
                const kcalPerMin = kcalPerMinAt70 * (weight/70);
                const minutes = Math.ceil(overAmount / kcalPerMin);
                return (
                  <div className="exercise-row" key={name}>
                    <span className="exercise-name">{name}</span>
                    <span className="exercise-time">약 {minutes}분</span>
                  </div>
                );
              })}
            </div>
            <div className="footer-note" style={{marginTop:6}}>
              MET(운동대사당량) 공식 기준 추정치이며, 개인 체력·강도에 따라 실제 소모량은 달라질 수 있습니다.
            </div>
          </div>
        )}
        <div className="macro-summary">
          <div className="macro-bar-wrap">
            <div className="macro-bar">
              <div className="macro-seg" style={{width: macroPct.carb + '%', background:'#6c4fd1'}}></div>
              <div className="macro-seg" style={{width: macroPct.protein + '%', background:'#e0497a'}}></div>
              <div className="macro-seg" style={{width: macroPct.fat + '%', background:'#f2a93c'}}></div>
            </div>
          </div>
          <div className="macro-legend">
            <div className="macro-item">
              <span className="macro-dot" style={{background:'#6c4fd1'}}></span>
              탄수화물 <b>{macroTotals.carb.toFixed(1)}g</b>
              <span className="macro-pct">({macroPct.carb}%)</span>
            </div>
            <div className="macro-item">
              <span className="macro-dot" style={{background:'#e0497a'}}></span>
              단백질 <b>{macroTotals.protein.toFixed(1)}g</b>
              <span className="macro-pct">({macroPct.protein}%)</span>
            </div>
            <div className="macro-item">
              <span className="macro-dot" style={{background:'#f2a93c'}}></span>
              지방 <b>{macroTotals.fat.toFixed(1)}g</b>
              <span className="macro-pct">({macroPct.fat}%)</span>
            </div>
          </div>
          <div className="footer-note" style={{marginTop:4, textAlign:'left'}}>
            비율은 탄수화물 4kcal/g · 단백질 4kcal/g · 지방 9kcal/g 기준, 각 영양소가 차지하는 칼로리 비중입니다.
          </div>
        </div>
      </div>

      <div className="form-section">
        <div className="section-eyebrow">음식 추가</div>
        {!customMode ? (
          <div className="field-row">
            <input
              list="food-options"
              type="text"
              placeholder="음식명 입력 또는 선택"
              value={foodName}
              onChange={e => setFoodName(e.target.value)}
            />
            <datalist id="food-options">
              {FOOD_DB.map(([n]) => <option key={n} value={n} />)}
            </datalist>
            <input
              type="number"
              placeholder="g"
              value={grams}
              onChange={e => setGrams(e.target.value)}
            />
          </div>
        ) : (
          <div className="field-row">
            <input
              type="text"
              placeholder="음식명"
              value={foodName}
              onChange={e => setFoodName(e.target.value)}
            />
            <input
              type="number"
              placeholder="100g당 kcal"
              value={customKcalPer100}
              onChange={e => setCustomKcalPer100(e.target.value)}
            />
            <input
              type="number"
              placeholder="g"
              value={grams}
              onChange={e => setGrams(e.target.value)}
            />
          </div>
        )}

        <span className="custom-toggle" onClick={() => setCustomMode(!customMode)}>
          {customMode ? '← 목록에서 선택하기' : '목록에 없는 음식이면 직접 칼로리 입력하기 →'}
        </span>

        <div className="row-actions">
          <button className="btn" onClick={handleAdd}>+ 추가하기</button>
        </div>
        {!customMode && foodName && !matchedFood && (
          <div style={{fontSize:12, color:'var(--accent)', marginTop:6}}>
            목록에 없는 음식이에요. "직접 칼로리 입력하기"를 눌러주세요.
          </div>
        )}
      </div>

      <div className="section-eyebrow" style={{marginBottom:6}}>오늘 먹은 음식 ({entries.length})</div>
      <div className="entry-list">
        {loading ? (
          <div className="empty-state">불러오는 중...</div>
        ) : entries.length === 0 ? (
          <div className="empty-state">아직 기록한 음식이 없어요.</div>
        ) : entries.map(e => (
          <div className="entry-row" key={e.id}>
            <div>
              <div className="entry-name">{e.name}</div>
              {editingId === e.id ? (
                <div className="edit-grams-row">
                  <input
                    type="number"
                    value={editGrams}
                    onChange={ev => setEditGrams(ev.target.value)}
                    className="edit-grams-input"
                    autoFocus
                  />
                  <span style={{fontSize:12, color:'var(--muted)'}}>g</span>
                  <button className="btn btn-small" onClick={() => saveEdit(e)}>저장</button>
                  <button className="btn btn-ghost btn-small" onClick={cancelEdit}>취소</button>
                </div>
              ) : (
                <div className="entry-meta">{e.grams}g · {e.kcalPer100}kcal/100g</div>
              )}
              <div className="entry-macros">
                {e.isCustom
                  ? '영양성분 정보 없음 (직접 입력)'
                  : `탄 ${e.carb}g · 단 ${e.protein}g · 지 ${e.fat}g`}
              </div>
            </div>
            <div style={{display:'flex', alignItems:'center'}}>
              <span className="entry-kcal">{e.kcal} kcal</span>
              {editingId !== e.id && (
                <button className="entry-edit" onClick={() => startEdit(e)}>✎</button>
              )}
              <button className="entry-del" onClick={() => handleDelete(e.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>

      <div className="form-section">
        <div className="section-eyebrow">목표 칼로리({goal.toLocaleString()}kcal) 맞춤 식단 추천</div>
        <div className="cuisine-tabs">
          {Object.keys(MEAL_PLANS).map(c => (
            <button
              key={c}
              className={"cuisine-tab" + (selectedCuisine === c ? " active" : "")}
              onClick={() => setSelectedCuisine(c)}
            >{c}</button>
          ))}
        </div>
        {["아침","점심","저녁"].map(mealTime => {
          const mealItems = scaledMealPlan.items.filter(i => i.meal === mealTime);
          if(mealItems.length === 0) return null;
          const mealKcal = mealItems.reduce((s,i)=>s+i.kcal,0);
          return (
            <div className="meal-block" key={mealTime}>
              <div className="meal-block-header">
                <span className="meal-tag">{mealTime}</span>
                <span className="meal-block-kcal">{mealKcal} kcal</span>
              </div>
              {mealItems.map(i => (
                <div className="meal-item-row" key={i.name}>
                  <span>{i.name} <span className="meal-item-grams">{i.grams}g</span></span>
                  <span className="meal-item-kcal">{i.kcal} kcal</span>
                </div>
              ))}
            </div>
          );
        })}
        <div className="plan-total-row">
          <span>하루 합계</span>
          <span>{scaledMealPlan.totalKcal.toLocaleString()} kcal <span style={{color:'var(--muted)', fontWeight:400}}>(목표 {goal.toLocaleString()}kcal)</span></span>
        </div>
        <div className="footer-note" style={{marginTop:4}}>
          1끼 분량을 10g 단위로 반올림해 목표 칼로리에 맞춘 예시 식단입니다. 실제 섭취량은 기호에 맞게 조절하세요.
        </div>
      </div>

      <div className="footer-note">
        칼로리는 식품의약품안전처 식품영양성분 DB를 참고한 100g당 평균값 기준 추정치이며,<br/>
        실제 섭취 칼로리는 조리법·브랜드에 따라 달라질 수 있습니다.<br/>
        목록에 없는 음식은 "직접 입력"으로 정확한 값을 넣어주세요.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
